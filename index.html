<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SEDIMENT</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="icon" href="favicon.png" type="favicon/png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Serif+KR:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:      #D2DDCB;
      --ink:     #576151;
      --ink-60:  rgba(87,97,81,.6);
      --ink-30:  rgba(87,97,81,.3);
      --ink-15:  rgba(87,97,81,.15);
      --font-en: 'STIX Two Text', serif;
      --font-ko: 'Noto Serif KR', serif;
      --max-w:   600px;
      --pad-x:   28px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-ko);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .en { font-family: var(--font-en); }

    #app {
      max-width: var(--max-w);
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ════════════════════════════
       INDEX
    ════════════════════════════ */
    #screen-index {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: 0 var(--pad-x);
    }
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-top: 32px;
    }
    .top-nav-links { display: flex; flex-direction: column; gap: 2px; }
    .top-nav-links a {
      font-family: var(--font-en);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      line-height: 1.75;
      transition: opacity .15s;
    }
    .top-nav-links a:hover { opacity: .5; }
    .btn-add {
      font-family: var(--font-en);
      font-size: 24px;
      color: var(--ink);
      background: none;
      border: none;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      transition: opacity .15s;
    }
    .btn-add:hover { opacity: .5; }

    .contents-header { text-align: center; padding: 44px 0 22px; }
    .contents-label {
      font-family: var(--font-en);
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--ink-60);
      display: block;
      margin-bottom: 16px;
    }
    .contents-title {
      font-family: var(--font-en);
      font-size: 40px;
      font-style: italic;
      font-weight: 500;
      letter-spacing: .04em;
    }

    .chapter-divider {
      display: flex;
      justify-content: space-between;
      padding: 10px 0 7px;
      border-top: 1px solid var(--ink);
    }
    .chapter-divider span {
      font-family: var(--font-en);
      font-size: 9px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--ink-60);
    }

    .chapter-list { flex: 1; display: flex; flex-direction: column; }
    .board-block { padding: 20px 0 26px; border-bottom: 1px solid var(--ink-30); }
    .board-block:last-child { border-bottom: none; }

    .board-title-row { display: flex; align-items: baseline; margin-bottom: 14px; }
    .board-roman {
      font-family: var(--font-en);
      font-size: 11px;
      color: var(--ink-60);
      flex-shrink: 0;
      width: 28px;
    }
    .board-name {
      font-family: var(--font-en);
      font-size: 14.5px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .board-dots {
      flex: 1;
      border-bottom: 1px dotted var(--ink-60);
      margin: 0 8px 3px;
      min-width: 16px;
    }
    /* PAGE 자리 = 게시글 수 */
    .board-count {
      font-family: var(--font-en);
      font-size: 13px;
      font-style: italic;
      color: var(--ink-60);
      flex-shrink: 0;
      min-width: 16px;
      text-align: right;
    }

    /* 에피소드 목록: 6줄 고정 + 항상 스크롤 가능 */
    .episode-list {
      padding-left: 28px;
      height: 132px;           /* ~6줄 고정 */
      overflow-y: scroll;      /* auto 대신 scroll로 항상 스크롤바 */
      scrollbar-width: thin;
      scrollbar-color: var(--ink-30) transparent;
    }
    .episode-list::-webkit-scrollbar { width: 4px; }
    .episode-list::-webkit-scrollbar-track { background: transparent; }
    .episode-list::-webkit-scrollbar-thumb { background: var(--ink-30); border-radius: 2px; }

    .episode-item {
      font-family: var(--font-ko);
      font-size: 11.5px;
      color: var(--ink);
      line-height: 1.95;
      cursor: pointer;
      text-decoration: none;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity .15s;
    }
    .episode-item .ep-label {
      font-family: var(--font-en);
      font-size: 10px;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--ink-60);
      margin-right: 5px;
    }
    .episode-item:hover { opacity: .5; }

    .state-msg {
      font-family: var(--font-en);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-30);
      padding: 10px 0;
    }

    #screen-viewer { display: none; flex-direction: column; min-height: 100dvh; }

    .viewer-topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 20px var(--pad-x) 0;
      border-bottom: 1px solid var(--ink-15);
    }
    .viewer-breadcrumb {
      font-family: var(--font-en);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-60);
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .viewer-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .viewer-actions button {
      font-family: var(--font-en);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      transition: opacity .15s;
    }
    .viewer-actions button:hover { opacity: .5; }

    /* 타이포 컨트롤 — topbar 안에 포함되어 함께 sticky */
    .viewer-settings {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      padding: 10px 0 12px;
    }
    .setting-group { display: flex; align-items: center; gap: 5px; }
    .setting-label {
      font-family: var(--font-en);
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-60);
    }
    .setting-btn {
      background: none;
      border: 1px solid var(--ink-30);
      color: var(--ink);
      font-family: var(--font-en);
      font-size: 10px;
      padding: 2px 7px;
      cursor: pointer;
      line-height: 1.6;
      transition: border-color .15s;
    }
    .setting-btn.active, .setting-btn:hover { border-color: var(--ink); }

    /* 본문 영역 */
    .viewer-body {
      padding: 28px var(--pad-x) 80px;
    }

    /* ── PLAY 버튼: 본문 상단에 위치 ── */
    .play-inline-wrap {
      display: flex;
      justify-content: center;
      margin-top: 50px;
      margin-bottom: 50px;
    }
    #btn-play {
      font-family: var(--font-en);
      font-size: 12px;
      font-style: italic;
      font-weight: bold;
      letter-spacing: .18em;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      padding: 8px 15px;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    #btn-play:hover, #btn-play.playing { background: var(--ink); color: var(--bg); }

    /* 본문 텍스트 */
    .article-content {
      font-family: var(--font-ko);
      font-size: 15px;
      line-height: 2;
      letter-spacing: 0em;
      color: var(--ink);
      /* 좌우 justify, 마지막 줄은 left (짧은 문장 자동 왼쪽 정렬) */
      text-align: justify;
      text-align-last: left;
      word-break: keep-all;
    }
    .article-content p {
      margin-bottom: 1.4em;
      /* 각 단락도 동일 적용 */
      text-align: justify;
      text-align-last: left;
    }
    /* 빈 줄(빈 p) — 단락 간격으로 활용 */
    .article-content p:empty { margin-bottom: 0; height: 1.4em; }

    /* drop cap */
    .article-content p.drop-cap::first-letter {
      font-size: 3.8em;
      font-weight: 600;
      float: left;
      line-height: .86;
      margin-right: 5px;
      margin-top: 5px;
    }

    /* 타이포 변형 */
    .article-content[data-size="sm"] { font-size: 13.5px; }
    .article-content[data-size="md"] { font-size: 15px; }
    .article-content[data-size="lg"] { font-size: 17px; }
    .article-content[data-lh="compact"] { line-height: 1.7; }
    .article-content[data-lh="normal"]  { line-height: 2;   }
    .article-content[data-lh="loose"]   { line-height: 2.5; }
    .article-content[data-ls="tight"]  { letter-spacing: -.01em; }
    .article-content[data-ls="normal"] { letter-spacing: 0em;    }
    .article-content[data-ls="wide"]   { letter-spacing: .06em;  }

    /* ════════════════════════════
       WRITE
    ════════════════════════════ */
    #screen-write {
      display: none;
      flex-direction: column;
      height: 100dvh;          /* 화면 전체 높이 고정 */
      padding: 0 var(--pad-x);
    }
    .write-top { padding: 28px 0 16px; flex-shrink: 0; }
    .write-top button {
      font-family: var(--font-en);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      transition: opacity .15s;
    }
    .write-top button:hover { opacity: .5; }

    .board-select-wrap {
      position: relative;
      border-bottom: 1px solid var(--ink);
      margin-bottom: 18px;
      flex-shrink: 0;
    }
    .board-select {
      width: 100%;
      appearance: none;
      background: transparent;
      border: none;
      font-family: var(--font-ko);
      font-size: 12px;
      color: var(--ink-60);
      padding: 10px 36px 10px 0;
      cursor: pointer;
      outline: none;
    }
    .board-select option { color: var(--ink); background: var(--bg); }
    .board-select-arrow {
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 26px; height: 26px;
      border: 1px solid var(--ink);
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .board-select-arrow svg { width: 10px; height: 6px; fill: var(--ink); }

    .write-epnum-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    .write-epnum-label {
      font-family: var(--font-en);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-60);
    }
    .write-epnum-input {
      font-family: var(--font-en);
      font-size: 13px;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--ink-30);
      outline: none;
      width: 60px;
      padding: 4px 0;
      text-align: center;
    }

    .title-input {
      font-family: var(--font-ko);
      font-size: 20px;
      font-weight: 500;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--ink-30);
      outline: none;
      width: 100%;
      padding: 8px 0 12px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    .title-input::placeholder { color: var(--ink-30); }

    /* 글쓰기 영역 — 남은 공간 전부 차지 */
    .body-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--ink-30);
      padding: 14px 16px;
      margin-bottom: 0;
      min-height: 0;
    }
    .body-textarea {
      flex: 1;
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-ko);
      font-size: 14px;
      line-height: 2;
      color: var(--ink);
      resize: none;
    }
    .body-textarea::placeholder { color: var(--ink-30); }

    /* 하단 힌트 + 저장 버튼 */
    .write-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0 20px;
      flex-shrink: 0;
    }
    .write-hint {
      font-family: var(--font-en);
      font-size: 9px;
      letter-spacing: .07em;
      color: var(--ink-60);
    }
    .btn-save {
      font-family: var(--font-en);
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--ink);
      border: none;
      padding: 11px 30px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-save:hover { opacity: .75; }
    .btn-save:disabled { opacity: .4; cursor: not-allowed; }

    /* ── TOP 버튼 ── */
    #btn-top {
      position: fixed;
      bottom: 32px;
      right: calc(50% - var(--max-w) / 2 + 20px);
      font-family: var(--font-en);
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--bg);
      border: 1px solid var(--ink-30);
      padding: 7px 12px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 200;
    }
    #btn-top.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #btn-top:hover { border-color: var(--ink); }

    /* max-w보다 좁은 화면에서는 그냥 우하단 고정 */
    @media (max-width: 600px) {
      #btn-top { right: 20px; }
    }

    /* ── 에피소드 하단 네비게이션 ── */
    .ep-nav {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 40px var(--pad-x) 60px;
      border-top: 1px solid var(--ink-15);
      margin-top: 20px;
    }
    .ep-nav-btn {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      text-align: left;
      max-width: 44%;
      transition: opacity .15s;
    }
    .ep-nav-btn.next { text-align: right; align-items: flex-end; }
    .ep-nav-btn:hover { opacity: .5; }
    .ep-nav-btn:disabled { opacity: .2; cursor: default; }
    .ep-nav-label {
      font-family: var(--font-en);
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink-60);
    }
    .ep-nav-title {
      font-family: var(--font-ko);
      font-size: 11.5px;
      color: var(--ink);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .ep-nav-spacer { flex: 1; }

    /* ════════════════════════════
       TIMELINE
    ════════════════════════════ */
    #screen-timeline {
      display: none;
      flex-direction: column;
      min-height: 100dvh;
      padding: 0 var(--pad-x);
    }

    /* ── 타임라인 상단 바 ── */
    .tl-topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-top: 32px;
      padding-bottom: 6px;
    }
    .tl-topbar-left { display: flex; flex-direction: column; gap: 2px; }
    .tl-topbar-left button, .tl-topbar-right button {
      font-family: var(--font-en);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      line-height: 1.75;
      text-align: left;
      transition: opacity .15s;
    }
    .tl-topbar-left button:hover, .tl-topbar-right button:hover { opacity: .5; }
    .tl-add-btn {
      font-family: var(--font-en);
      font-size: 24px;
      color: var(--ink);
      background: none;
      border: none;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      transition: opacity .15s;
    }
    .tl-add-btn:hover { opacity: .5; }

    /* ── 타임라인 헤더 ── */
    .tl-header { text-align: center; padding: 36px 0 20px; }
    .tl-header-label {
      font-family: var(--font-en);
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--ink-60);
      display: block;
      margin-bottom: 14px;
    }
    .tl-header-title {
      font-family: var(--font-en);
      font-size: 32px;
      font-style: italic;
      font-weight: 500;
      letter-spacing: .04em;
    }

    /* ── 타임라인 선택 탭 ── */
    .tl-tabs {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--ink);
      border-bottom: 1px solid var(--ink-30);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tl-tabs::-webkit-scrollbar { display: none; }
    .tl-tab {
      font-family: var(--font-en);
      font-size: 9.5px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-60);
      background: none;
      border: none;
      border-right: 1px solid var(--ink-15);
      padding: 9px 14px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: color .15s, background .15s;
    }
    .tl-tab:last-child { border-right: none; }
    .tl-tab.active {
      color: var(--ink);
      background: rgba(87,97,81,.07);
    }
    .tl-tab:hover { color: var(--ink); }

    /* ── 세로 타임라인 ── */
    .tl-body {
      flex: 1;
      padding: 32px 0 80px;
      position: relative;
    }

    /* 세로 중심선 */
    .tl-line {
      position: absolute;
      left: 11px;
      top: 32px;
      bottom: 80px;
      width: 1px;
      background: var(--ink-30);
    }

    .tl-items { display: flex; flex-direction: column; gap: 0; }

    .tl-item {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      padding-bottom: 28px;
      position: relative;
    }

    /* 점 */
    .tl-dot {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1.5px solid var(--ink);
      background: var(--bg);
      margin-top: 5px;
      margin-right: 3px;
      position: relative;
      z-index: 1;
      transition: background .15s;
    }
    .tl-item:hover .tl-dot { background: var(--ink); }

    /* 내용 */
    .tl-content { flex: 1; min-width: 0; }
    .tl-num {
      font-family: var(--font-en);
      font-size: 9.5px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-60);
      margin-bottom: 4px;
    }
    .tl-title {
      font-family: var(--font-ko);
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .tl-desc {
      font-family: var(--font-ko);
      font-size: 12.5px;
      color: var(--ink-60);
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: keep-all;
    }
    .tl-item-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .tl-item-btn {
      font-family: var(--font-en);
      font-size: 9px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-60);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      transition: color .15s;
    }
    .tl-item-btn:hover { color: var(--ink); }
    .tl-item-btn.del:hover { color: #8b6060; }

    /* ── 타임라인 WRITE 폼 ── */
    #screen-tl-write {
      display: none;
      flex-direction: column;
      height: 100dvh;
      padding: 0 var(--pad-x);
    }
    .tl-write-top { padding: 28px 0 18px; flex-shrink: 0; }
    .tl-write-top button {
      font-family: var(--font-en);
      font-size: 10px;
      letter-spacing: .12em;

/* ════════════════════════════
   FULL SCREEN WAVE LOADING
════════════════════════════ */
#loading-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #576151; /* 검은 배경 */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 0.6s ease-out, visibility 0.6s;
  overflow: hidden; /* 파도가 화면 밖으로 나가지 않게 */
}

.wave-container {
  position: absolute; /* 배경처럼 깔기 위해 */
  bottom: 0; left: 0;
  width: 100%;
  height: 100%; /* 전체를 채우되 파도 높이로 조절 */
  overflow: hidden;
  z-index: -1;
}

.wave {
  position: absolute;
  bottom: -150%; /* 화면 하단에 위치 */
  left: -50%;
  width: 200vw; 
  height: 200vw;
  background: var(--bg);
  opacity: 0.4;
  border-radius: 40%;
  /* top을 50%로 설정하면 화면 절반 정도까지 차오릅니다 */
  top: 55%; 
  animation: drift 7s infinite linear;
}

.wave:nth-child(2) {
  top: 58%; /* 약간 낮게 배치하여 레이어 생성 */
  animation: drift 9s infinite linear;
  opacity: 0.2;
}

.wave:nth-child(3) {
  top: 52%; /* 약간 높게 배치 */
  animation: drift 11s infinite linear;
  opacity: 0.1;
  background: white;
}

@keyframes drift {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.loading-text {
  /* 파도 위에서도 잘 보이도록 z-index 부여 */
  position: relative;
  z-index: 10;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 0.2em;
  color: #D2DDCB; /* 어두운 배경/파도 위에서 잘 보이게 흰색 계열 */
}

#loading-screen.fade-out {
  opacity: 0;
  visibility: hidden;
}

<script>
  /* ─── 화면 전환 ─── */
  function showScreen(name) {
    const screens = ['index','viewer','write','timeline','tl-write'];
    screens.forEach(s => {
      const el = document.getElementById('screen-' + s);
      if (el) el.style.display = 'none';
    });
    const target = document.getElementById('screen-' + name);
    if (target) target.style.display = 'flex';

    if (name === 'index'    && window._refreshBoards) window._refreshBoards();
    if (name === 'timeline' && window._refreshTimeline) window._refreshTimeline();
    if (name !== 'viewer') stopYoutube();
  }

  function openWrite() {
    window._editingEpId = null;
    document.getElementById('write-board-select').value = '';
    document.getElementById('write-epnum').value = '';
    document.getElementById('write-title').value = '';
    document.getElementById('write-body').value  = '';
    showScreen('write');
  }

  function openTlWrite(editId, tlName) {
    window._editingTlId   = editId   ?? null;
    window._editingTlName = tlName   ?? null;
    document.getElementById('tl-order-input').value  = '';
    document.getElementById('tl-title-input').value  = '';
    document.getElementById('tl-body-textarea').value = '';
    document.getElementById('tl-newname-row').style.display = 'none';
    document.getElementById('tl-newname-input').value = '';
    if (window._populateTlSelect) window._populateTlSelect(tlName ?? '');
    showScreen('tl-write');
  }

  function onTlNameSelect() {
    const sel = document.getElementById('tl-name-select');
    const row = document.getElementById('tl-newname-row');
    row.style.display = sel.value === '__new__' ? 'flex' : 'none';
  }

  function saveTlItem()    { if (window._saveTlItem)    window._saveTlItem(); }

  /* ─── Ctrl+Enter 저장 ─── */
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      const ws  = document.getElementById('screen-write');
      const tls = document.getElementById('screen-tl-write');
      if (ws  && ws.style.display  !== 'none') saveEpisode();
      if (tls && tls.style.display !== 'none') saveTlItem();
    }
  });

  /* ─── 타이포 설정 ─── */
  function setSetting(btn) {
    const target = btn.dataset.target;
    const val    = btn.dataset.val;
    document.getElementById('article-content').dataset[target] = val;
    btn.closest('.setting-group').querySelectorAll('.setting-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    localStorage.setItem('sed-' + target, val);
  }
  ['size','lh','ls'].forEach(k => {
    const v = localStorage.getItem('sed-' + k);
    if (!v) return;
    const ac = document.getElementById('article-content');
    if (ac) ac.dataset[k] = v;
    const btn = document.querySelector(`[data-target="${k}"][data-val="${v}"]`);
    if (btn) {
      btn.closest('.setting-group').querySelectorAll('.setting-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  });

  /* ─── YouTube 뮤직 플레이어 ─── */
  let ytPlayer   = null;
  let ytReady    = false;
  let pendingPlay = false;   // API 로드 전 PLAY 요청 대기
  window.ytVideoId = null;

  // YT IFrame API 로드
  (function() {
    const s = document.createElement('script');
    s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
  })();

  window.onYouTubeIframeAPIReady = function() {
    ytReady = true;
    if (pendingPlay) { pendingPlay = false; _createPlayer(); }
  };

  function extractYTId(text) {
    // youtu.be, watch?v=, embed/, shorts/ 모두 커버
    const m = text.match(/(?:youtu\.be\/|[?&]v=|\/embed\/|\/shorts\/)([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  function _createPlayer() {
    let wrap = document.getElementById('_yt_wrap');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = '_yt_wrap';
      wrap.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;overflow:hidden;bottom:0;left:0;z-index:-1;';
      document.body.appendChild(wrap);
    }
    wrap.innerHTML = '<div id="_yt_el"></div>';

    ytPlayer = new YT.Player('_yt_el', {
      videoId: window.ytVideoId,
      playerVars: {
        autoplay: 1,
        controls: 0,
        playsinline: 1,
        loop: 1,                          // 반복재생
        playlist: window.ytVideoId        // loop 작동에 필요
      },
      events: {
        onReady: function(e) { e.target.playVideo(); },
        onStateChange: function(e) {
          const btn = document.getElementById('btn-play');
          if (!btn) return;
          if (e.data === YT.PlayerState.PLAYING) {
            btn.textContent = 'STOP'; btn.classList.add('playing');
          } else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
            btn.textContent = 'PLAY'; btn.classList.remove('playing');
          }
        },
        onError: function() {
          const btn = document.getElementById('btn-play');
          if (btn) { btn.textContent = 'PLAY'; btn.classList.remove('playing'); }
        }
      }
    });
  }

  function togglePlay() {
    if (!ytReady) { pendingPlay = true; return; }

    if (!ytPlayer) {
      _createPlayer();
      return;
    }
    const state = ytPlayer.getPlayerState ? ytPlayer.getPlayerState() : -1;
    if (state === YT.PlayerState.PLAYING) {
      ytPlayer.pauseVideo();
    } else {
      ytPlayer.playVideo();
    }
  }

  function stopYoutube() {
    if (ytPlayer) {
      try { ytPlayer.stopVideo(); ytPlayer.destroy(); } catch(e) {}
      ytPlayer = null;
    }
    const wrap = document.getElementById('_yt_wrap');
    if (wrap) wrap.innerHTML = '';
    const btn = document.getElementById('btn-play');
    if (btn) { btn.textContent = 'PLAY'; btn.classList.remove('playing'); }
  }

  /* ─── TOP 버튼 스크롤 감지 ─── */
  window.addEventListener('scroll', function() {
    const topBtn  = document.getElementById('btn-top');
    const viewer  = document.getElementById('screen-viewer');
    if (!topBtn) return;
    const inViewer = viewer && viewer.style.display !== 'none';
    if (inViewer && window.scrollY > 300) {
      topBtn.classList.add('visible');
    } else {
      topBtn.classList.remove('visible');
    }
  }, { passive: true });

  /* ─── 위임 함수 ─── */
  function editCurrent()      { if (window._editCurrent)  window._editCurrent(); }
  function deleteEpisode()    { if (window._deleteEpisode) window._deleteEpisode(); }
  function saveEpisode()      { if (window._saveEpisode)  window._saveEpisode(); }
  function downloadMarkdown() { if (window._downloadMd)   window._downloadMd(); }
</script>

  let currentEpList  = [];   // 현재 게시판의 정렬된 ep 목록 [{id, epNum, subNum, title}]
  window._editingEpId = null;

  window._refreshBoards  = renderIndex;
  window._saveEpisode    = saveEpisode;
  window._editCurrent    = editCurrent;
  window._downloadMd     = downloadMarkdown;
  window._deleteEpisode  = deleteEpisode;

  /* ── 정렬 키 계산
       "바위의 귀공자 (2)" → subNum=2
       제목 끝의 (숫자) 패턴을 인식. 없으면 subNum=0
  ── */
  function sortKey(ep) {
    const epNum  = ep.epNum  ?? 0;
    const m = (ep.title ?? '').match(/\((\d+)\)\s*$/);
    const subNum = m ? parseInt(m[1]) : 0;
    return epNum * 10000 + subNum;   // 내림차순이므로 호출 측에서 b-a
  }

  showScreen('index');

  /* ── 인덱스 렌더 ── */
  async function renderIndex() {
    const listEl = document.getElementById('board-list');
    listEl.innerHTML = '';
    for (const b of BOARDS) {
      const block = document.createElement('div');
      block.className = 'board-block';
      block.innerHTML = `
        <div class="board-title-row">
          <span class="board-roman en">${b.roman}</span>
          <span class="board-name en">${b.name}</span>
          <span class="board-dots"></span>
          <span class="board-count en" id="count-${b.id}">—</span>
        </div>
        <div class="episode-list" id="eplist-${b.id}">
          <div class="state-msg" style="text-align:left;padding:4px 0">…</div>
        </div>
      `;
      listEl.appendChild(block);
      loadEpList(b.id);
    }
  }

  async function loadEpList(boardId) {
    const el      = document.getElementById('eplist-' + boardId);
    const countEl = document.getElementById('count-' + boardId);

    function sortedDocs(docs) {
      return docs.slice().sort((a, b) => sortKey(b.data()) - sortKey(a.data()));
    }

    function renderDocs(rawDocs) {
      const docs = sortedDocs(rawDocs);
      if (countEl) countEl.textContent = docs.length || '0';
      if (!docs.length) {
        el.innerHTML = '<div class="state-msg" style="text-align:left;padding:4px 0">—</div>';
        return;
      }
      el.innerHTML = '';
      docs.forEach(d => {
        const ep  = d.data();
        const num = ep.epNum != null ? String(ep.epNum).padStart(2, '0') : '—';
        const a   = document.createElement('a');
        a.className = 'episode-item';
        a.href = '#';
        a.addEventListener('click', e => { e.preventDefault(); openEpisode(boardId, d.id); });
        a.innerHTML = `<span class="ep-label en">EPISODE ${num}.&nbsp;</span>${ep.title ?? ''}`;
        el.appendChild(a);
      });
    }

    try {
      const snap = await getDocs(collection(db, 'boards', boardId, 'episodes'));
      renderDocs(snap.docs);
    } catch(e2) {
      if (countEl) countEl.textContent = '?';
      el.innerHTML = `<div class="state-msg" style="text-align:left;padding:4px 0;opacity:.5">연결 오류</div>`;
      console.error('Firestore:', e2);
    }
  }

  /* ── 에피소드 열기 ── */
  async function openEpisode(boardId, epId) {
    currentBoardId = boardId;
    currentEpId    = epId;
    showScreen('viewer');
    stopYoutube();

    const board = BOARDS.find(b => b.id === boardId);

    // 같은 게시판 전체 목록 로드 (네비게이션용) — sortKey 내림차순
    const allSnap = await getDocs(collection(db, 'boards', boardId, 'episodes'));
    currentEpList = allSnap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => sortKey(b) - sortKey(a));

    const snap = await getDoc(doc(db, 'boards', boardId, 'episodes', epId));
    if (!snap.exists()) return;
    const ep  = snap.data();
    const num = ep.epNum != null ? String(ep.epNum).padStart(2,'0') : '';

    document.getElementById('viewer-breadcrumb').textContent =
      `${board?.name ?? boardId} > EPISODE ${num}. ${ep.title ?? ''}`;

    // 이전/다음 네비게이션 설정
    const idx  = currentEpList.findIndex(e => e.id === epId);
    const prev = currentEpList[idx + 1] ?? null;   // 내림차순이므로 +1이 "이전(더 오래된)"
    const next = currentEpList[idx - 1] ?? null;   // -1이 "다음(더 최신)"

    const prevBtn   = document.getElementById('ep-prev');
    const nextBtn   = document.getElementById('ep-next');
    const prevTitle = document.getElementById('ep-prev-title');
    const nextTitle = document.getElementById('ep-next-title');

    if (prev) {
      prevBtn.disabled = false;
      prevBtn.onclick  = () => openEpisode(boardId, prev.id);
      const pNum = prev.epNum != null ? `EP.${String(prev.epNum).padStart(2,'0')} ` : '';
      prevTitle.textContent = pNum + (prev.title ?? '');
    } else {
      prevBtn.disabled = true;
      prevTitle.textContent = '';
    }
    if (next) {
      nextBtn.disabled = false;
      nextBtn.onclick  = () => openEpisode(boardId, next.id);
      const nNum = next.epNum != null ? `EP.${String(next.epNum).padStart(2,'0')} ` : '';
      nextTitle.textContent = nNum + (next.title ?? '');
    } else {
      nextBtn.disabled = true;
      nextTitle.textContent = '';
    }

    // YouTube 링크 추출
    const rawBody = ep.body ?? '';
    const vid = extractYTId(rawBody);
    window.ytVideoId = vid;

    // PLAY 버튼 삽입 (본문 상단)
    const playContainer = document.getElementById('play-inline-container');
    if (vid) {
      playContainer.innerHTML = `
        <div class="play-inline-wrap">
          <button id="btn-play" onclick="togglePlay()">PLAY</button>
        </div>`;
    } else {
      playContainer.innerHTML = '';
    }

    // 본문 렌더 — YouTube URL 줄 숨김
    const ytLineRe  = /^.*(?:youtu\.be\/|youtube\.com\/).*$/gm;
    const cleanBody = rawBody.replace(ytLineRe, '').replace(/\n{3,}/g, '\n\n').trim();

    const ac = document.getElementById('article-content');
    ac.innerHTML = '';
    const blocks = cleanBody.split(/\n\n+/);
    blocks.forEach((block, bi) => {
      if (!block.trim()) return;
      const p = document.createElement('p');
      if (bi === 0) p.classList.add('drop-cap');
      block.split('\n').forEach((line, li) => {
        if (li > 0) p.appendChild(document.createElement('br'));
        p.appendChild(document.createTextNode(line));
      });
      ac.appendChild(p);
    });

    document.documentElement.scrollTop = 0;
    window.scrollTo(0, 0);
  }

  /* ── 삭제 ── */
  async function deleteEpisode() {
    if (!currentBoardId || !currentEpId) return;
    const snap = await getDoc(doc(db, 'boards', currentBoardId, 'episodes', currentEpId));
    const title = snap.exists() ? (snap.data().title ?? '이 게시글') : '이 게시글';
    if (!confirm(`"${title}"을 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
    try {
      await deleteDoc(doc(db, 'boards', currentBoardId, 'episodes', currentEpId));
      stopYoutube();
      showScreen('index');
    } catch(e) {
      alert('삭제 실패: ' + e.message);
    }
  }

  /* ── 편집 ── */
  async function editCurrent() {
    if (!currentBoardId || !currentEpId) return;
    const snap = await getDoc(doc(db, 'boards', currentBoardId, 'episodes', currentEpId));
    if (!snap.exists()) return;
    const ep = snap.data();
    document.getElementById('write-board-select').value = currentBoardId;
    document.getElementById('write-epnum').value  = ep.epNum ?? '';
    document.getElementById('write-title').value  = ep.title ?? '';
    document.getElementById('write-body').value   = ep.body  ?? '';
    window._editingEpId = currentEpId;
    showScreen('write');
  }

  /* ── 저장 ── */
  async function saveEpisode() {
    const boardId = document.getElementById('write-board-select').value;
    const epNum   = parseInt(document.getElementById('write-epnum').value) || null;
    const title   = document.getElementById('write-title').value.trim();
    const body    = document.getElementById('write-body').value;
    if (!boardId) { alert('게시판을 선택해주세요.'); return; }
    if (!title)   { alert('제목을 입력해주세요.'); return; }

    const btn = document.getElementById('btn-save');
    btn.textContent = 'SAVING…'; btn.disabled = true;
    try {
      const epData = { title, body, epNum, updatedAt: new Date().toISOString() };
      const eid = window._editingEpId;
      if (eid) {
        await updateDoc(doc(db, 'boards', boardId, 'episodes', eid), epData);
        window._editingEpId = null;
      } else {
        await addDoc(collection(db, 'boards', boardId, 'episodes'), epData);
      }
      showScreen('index');
    } catch(e) {
      alert('저장 실패: ' + e.message);
    } finally {
      btn.textContent = 'SAVE'; btn.disabled = false;
    }
  }

  /* ── Markdown 다운로드 ── */
  async function downloadMarkdown() {
    const lines = ['# SEDIMENT\n'];
    for (const b of BOARDS) {
      lines.push(`\n---\n\n## ${b.name}\n`);
      try {
        const snap = await getDocs(collection(db, 'boards', b.id, 'episodes'));
        snap.docs
          .sort((a,c) => (a.data().epNum||0) - (c.data().epNum||0))
          .forEach(d => {
            const ep  = d.data();
            const num = ep.epNum != null ? String(ep.epNum).padStart(2,'0') : '??';
            lines.push(`\n### EPISODE ${num}. ${ep.title ?? ''}\n\n${ep.body ?? ''}\n`);
          });
      } catch(e) { /* skip */ }
    }
    const blob = new Blob([lines.join('\n')], { type: 'text/markdown;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'sediment.md'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  renderIndex();

  /* ════════════════════════════
     TIMELINE — Firebase 로직
  ════════════════════════════ */

  // Firestore 구조: timelines/{timelineName}/items/{itemId}
  //   item: { order: Number, title: String, desc: String, createdAt: String }

  let currentTlName = null;   // 현재 보고 있는 타임라인 이름
  let allTlNames    = [];     // 존재하는 타임라인 이름 목록
  window._editingTlId   = null;
  window._editingTlName = null;

  /* ── 정렬 키: order 기준, 없으면 0 ── */
  function tlSortKey(item) { return item.order ?? 0; }

  /* ── 타임라인 전체 새로고침 ── */
  async function refreshTimeline() {
    // 모든 타임라인 이름 수집
    try {
      const snap = await getDocs(collection(db, 'timelines'));
      allTlNames = snap.docs.map(d => d.id).sort();
    } catch(e) { allTlNames = []; }

    renderTlTabs();

    // 첫 탭 자동 선택
    if (!currentTlName && allTlNames.length > 0) currentTlName = allTlNames[0];
    if (currentTlName) renderTlItems(currentTlName);
    else {
      document.getElementById('tl-items').innerHTML =
        '<div class="state-msg" style="padding-left:28px">타임라인이 없습니다</div>';
    }
  }
  window._refreshTimeline = refreshTimeline;

  /* ── 탭 렌더 ── */
  function renderTlTabs() {
    const tabsEl = document.getElementById('tl-tabs');
    tabsEl.innerHTML = '';
    allTlNames.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'tl-tab' + (name === currentTlName ? ' active' : '');
      btn.textContent = name;
      btn.addEventListener('click', () => {
        currentTlName = name;
        document.querySelectorAll('.tl-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderTlItems(name);
      });
      tabsEl.appendChild(btn);
    });
  }

  /* ── 아이템 렌더 (번호 내림차순) ── */
  async function renderTlItems(tlName) {
    const el = document.getElementById('tl-items');
    el.innerHTML = '<div class="state-msg" style="padding-left:28px">…</div>';
    try {
      const snap = await getDocs(collection(db, 'timelines', tlName, 'items'));
      const items = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => tlSortKey(b) - tlSortKey(a));   // 내림차순

      if (!items.length) {
        el.innerHTML = '<div class="state-msg" style="padding-left:28px">항목이 없습니다.</div>';
        return;
      }
      el.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'tl-item';
        const num = item.order != null ? String(item.order).padStart(2,'0') : '—';
        div.innerHTML = `
          <div class="tl-dot"></div>
          <div class="tl-content">
            <div class="tl-num en">${num}.</div>
            <div class="tl-title">${escHtml(item.title ?? '')}</div>
            ${item.desc ? `<div class="tl-desc">${escHtml(item.desc)}</div>` : ''}
            <div class="tl-item-actions">
              <button class="tl-item-btn en" onclick="openTlWrite('${item.id}','${tlName}')">EDIT</button>
              <button class="tl-item-btn del en" onclick="deleteTlItem('${item.id}','${tlName}')">DELETE</button>
            </div>
          </div>`;
        el.appendChild(div);
      });
    } catch(e) {
      el.innerHTML = `<div class="state-msg" style="padding-left:28px;opacity:.5">오류: ${e.message}</div>`;
    }
  }

  /* ── HTML 이스케이프 ── */
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 셀렉트 채우기 (write 폼 열 때) ── */
  async function populateTlSelect(selectedName) {
    const sel = document.getElementById('tl-name-select');
    // 항상 최신 목록으로
    try {
      const snap = await getDocs(collection(db, 'timelines'));
      allTlNames = snap.docs.map(d => d.id).sort();
    } catch(e) {}

    sel.innerHTML = '<option value="">타임라인을 선택하세요</option>';
    allTlNames.forEach(n => {
      const o = document.createElement('option');
      o.value = n; o.textContent = n;
      if (n === selectedName) o.selected = true;
      sel.appendChild(o);
    });
    const newOpt = document.createElement('option');
    newOpt.value = '__new__'; newOpt.textContent = '+ 새 타임라인 만들기';
    sel.appendChild(newOpt);

    // 편집 모드면 기존 데이터 채우기
    if (window._editingTlId && window._editingTlName) {
      try {
        const snap = await getDoc(doc(db, 'timelines', window._editingTlName, 'items', window._editingTlId));
        if (snap.exists()) {
          const d = snap.data();
          document.getElementById('tl-order-input').value   = d.order  ?? '';
          document.getElementById('tl-title-input').value   = d.title  ?? '';
          document.getElementById('tl-body-textarea').value = d.desc   ?? '';
        }
      } catch(e) {}
    }
  }
  window._populateTlSelect = populateTlSelect;

  /* ── 저장 ── */
  async function saveTlItem() {
    const sel     = document.getElementById('tl-name-select');
    const newName = document.getElementById('tl-newname-input').value.trim();
    const tlName  = sel.value === '__new__' ? newName : sel.value;
    const order   = parseInt(document.getElementById('tl-order-input').value) || null;
    const title   = document.getElementById('tl-title-input').value.trim();
    const desc    = document.getElementById('tl-body-textarea').value;

    if (!tlName)  { alert('타임라인을 선택하거나 이름을 입력해주세요.'); return; }
    if (!title)   { alert('제목을 입력해주세요.'); return; }

    const btn = document.getElementById('tl-btn-save');
    btn.textContent = 'SAVING…'; btn.disabled = true;
    try {
      const data = { order, title, desc, updatedAt: new Date().toISOString() };
      const eid = window._editingTlId;
      const ename = window._editingTlName;

      if (eid && ename) {
        // 타임라인 이름이 바뀐 경우: 구 항목 삭제 후 새로 추가
        if (ename !== tlName) {
          await deleteDoc(doc(db, 'timelines', ename, 'items', eid));
          await addDoc(collection(db, 'timelines', tlName, 'items'), data);
        } else {
          await updateDoc(doc(db, 'timelines', tlName, 'items', eid), data);
        }
      } else {
        await addDoc(collection(db, 'timelines', tlName, 'items'), data);
      }
      window._editingTlId = null;
      window._editingTlName = null;
      currentTlName = tlName;
      showScreen('timeline');
    } catch(e) {
      alert('저장 실패: ' + e.message);
    } finally {
      btn.textContent = 'SAVE'; btn.disabled = false;
    }
  }
  window._saveTlItem = saveTlItem;

  /* ── 삭제 ── */
  async function deleteTlItem(itemId, tlName) {
    if (!confirm('이 항목을 삭제할까요?')) return;
    try {
      await deleteDoc(doc(db, 'timelines', tlName, 'items', itemId));
      renderTlItems(tlName);
    } catch(e) { alert('삭제 실패: ' + e.message); }
  }
  window.deleteTlItem = deleteTlItem;

  Promise.all([renderIndex()]).then(() => {
  const loader = document.getElementById('loading-screen');
  if (loader) {
    // 부드러운 전환을 위해 약간의 지연(500ms) 후 제거
    setTimeout(() => {
      loader.classList.add('fade-out');
    }, 500);
  }
});
</script>
</body>
</html>
